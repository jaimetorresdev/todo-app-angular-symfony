<form
  [formGroup]="form"
  (ngSubmit)="onSubmit()"
  class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-700 dark:bg-slate-900"
>
  <div>
    <label for="titulo" class="block text-sm font-medium text-slate-700 dark:text-slate-200">Título</label>
    <input
      id="titulo"
      type="text"
      formControlName="titulo"
      aria-label="Título de la tarea"
      [ngClass]="{
        'border-red-500 focus:ring-red-500': form.get('titulo')?.invalid && form.get('titulo')?.touched,
        'border-slate-300 focus:ring-primary-600 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100': !(form.get('titulo')?.invalid && form.get('titulo')?.touched)
      }"
      class="mt-1 h-10 w-full rounded-md border px-3 text-sm focus:outline-none focus:ring-2"
    />
    <p
      *ngIf="form.get('titulo')?.hasError('required') && form.get('titulo')?.touched"
      class="mt-1 text-sm text-red-600"
    >
      El título es obligatorio.
    </p>
    <p
      *ngIf="form.get('titulo')?.hasError('minlength') && form.get('titulo')?.touched"
      class="mt-1 text-sm text-red-600"
    >
      Mínimo 3 caracteres.
    </p>
  </div>

  <div class="mt-4">
    <label for="descripcion" class="block text-sm font-medium text-slate-700 dark:text-slate-200">Descripción</label>
    <textarea
      id="descripcion"
      formControlName="descripcion"
      rows="3"
      aria-label="Descripción de la tarea"
      [ngClass]="{
        'border-red-500 focus:ring-red-500': form.get('descripcion')?.invalid && form.get('descripcion')?.touched,
        'border-slate-300 focus:ring-primary-600 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100': !(form.get('descripcion')?.invalid && form.get('descripcion')?.touched)
      }"
      class="mt-1 w-full rounded-md border px-3 py-2 text-sm focus:outline-none focus:ring-2"
    ></textarea>
    <p
      *ngIf="form.get('descripcion')?.hasError('maxlength') && form.get('descripcion')?.touched"
      class="mt-1 text-sm text-red-600"
    >
      Máximo 500 caracteres.
    </p>
  </div>

  <div class="mt-4">
    <label for="estado" class="block text-sm font-medium text-slate-700 dark:text-slate-200">Estado</label>
    <select
      id="estado"
      formControlName="estado"
      aria-label="Estado de la tarea"
      class="mt-1 h-10 w-full rounded-md border border-slate-300 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary-600 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100"
    >
      <option value="pendiente">Pendiente</option>
      <option value="en progreso">En progreso</option>
      <option value="completada">Completada</option>
    </select>
  </div>

  <div class="mt-4">
    <label for="fechaLimite" class="block text-sm font-medium text-slate-700 dark:text-slate-200">Fecha límite</label>
    <input
      id="fechaLimite"
      type="date"
      formControlName="fechaLimite"
      aria-label="Fecha límite de la tarea"
      class="mt-1 h-10 w-full rounded-md border border-slate-300 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary-600 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100"
    />
  </div>

  <button
    type="submit"
    [disabled]="form.invalid || submitting"
    aria-label="Guardar tarea"
    class="mt-6 inline-flex h-10 items-center justify-center rounded-md bg-primary px-5 text-sm font-medium text-white shadow-sm transition hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-600 focus:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-60"
  >
    {{ submitting ? 'Guardando...' : 'Guardar' }}
  </button>
</form>

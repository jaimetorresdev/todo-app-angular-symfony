<form
  [formGroup]="form"
  (ngSubmit)="onSubmit()"
  class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm"
>
  <label class="block text-sm font-medium text-slate-700">Título</label>
  <input
    type="text"
    formControlName="titulo"
    class="mt-1 w-full rounded border border-slate-300 px-3 py-2"
  />
  <p
    *ngIf="form.get('titulo')?.hasError('required') && form.get('titulo')?.touched"
    class="mt-1 text-sm text-red-600"
  >
    El título es obligatorio.
  </p>
  <p
    *ngIf="form.get('titulo')?.hasError('minlength') && form.get('titulo')?.touched"
    class="mt-1 text-sm text-red-600"
  >
    Mínimo 3 caracteres.
  </p>

  <label class="mt-4 block text-sm font-medium text-slate-700">Descripción</label>
  <textarea
    formControlName="descripcion"
    rows="3"
    class="mt-1 w-full rounded border border-slate-300 px-3 py-2"
  ></textarea>
  <p
    *ngIf="form.get('descripcion')?.hasError('maxlength') && form.get('descripcion')?.touched"
    class="mt-1 text-sm text-red-600"
  >
    Máximo 500 caracteres.
  </p>

  <label class="mt-4 block text-sm font-medium text-slate-700">Estado</label>
  <select
    formControlName="estado"
    class="mt-1 w-full rounded border border-slate-300 px-3 py-2"
  >
    <option value="pendiente">Pendiente</option>
    <option value="en progreso">En progreso</option>
    <option value="completada">Completada</option>
  </select>

  <label class="mt-4 block text-sm font-medium text-slate-700">Fecha límite</label>
  <input
    type="date"
    formControlName="fechaLimite"
    class="mt-1 w-full rounded border border-slate-300 px-3 py-2"
  />

  <button
    type="submit"
    [disabled]="form.invalid"
    class="mt-6 inline-flex h-11 items-center justify-center rounded-md bg-blue-600 px-5 text-sm font-semibold text-white shadow-sm disabled:cursor-not-allowed disabled:opacity-50"
  >
    Guardar
  </button>
</form>

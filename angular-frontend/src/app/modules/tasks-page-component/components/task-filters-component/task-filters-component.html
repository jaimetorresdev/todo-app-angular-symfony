<form (ngSubmit)="onApply()" [formGroup]="form"
  class="rounded-2xl border border-slate-200 bg-slate-50/60 px-5 py-4 dark:border-slate-700 dark:bg-slate-800/40">

  <div class="flex flex-wrap items-end gap-3">

    <!-- Buscar -->
    <div class="relative flex-1 min-w-[180px]">
      <label class="mb-1.5 block text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500">Buscar</label>
      <div class="relative">
        <svg class="absolute inset-y-0 left-3 my-auto h-3.5 w-3.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"/>
        </svg>
        <input formControlName="texto" placeholder="Título o descripción…" (blur)="onBlur()"
          class="h-9 w-full rounded-xl border border-slate-200 bg-white pl-9 pr-3 text-sm text-slate-900 placeholder-slate-400 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/10 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-100"/>
        @if (suggestions.length > 0) {
          <ul class="absolute z-20 mt-1 w-full overflow-hidden rounded-xl border border-slate-200 bg-white shadow-xl dark:border-slate-700 dark:bg-slate-800">
            @for (s of suggestions; track s) {
              <li (mousedown)="onSuggestionMousedown($event)" (click)="selectSuggestion(s)"
                class="cursor-pointer px-4 py-2.5 text-sm text-slate-700 hover:bg-blue-50 dark:text-slate-200 dark:hover:bg-blue-900/20 transition-colors">
                {{ s }}
              </li>
            }
          </ul>
        }
      </div>
    </div>

    <!-- Estado -->
    <div class="w-40">
      <label class="mb-1.5 block text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500">Estado</label>
      <select formControlName="estado"
        class="h-9 w-full rounded-xl border border-slate-200 bg-white px-3 text-sm text-slate-900 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/10 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-100">
        <option value="">Cualquier estado</option>
        <option value="pendiente">Pendiente</option>
        <option value="en progreso">En progreso</option>
        <option value="completada">Completada</option>
      </select>
    </div>

    <!-- Prioridad -->
    <div class="w-36">
      <label class="mb-1.5 block text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500">Prioridad</label>
      <select formControlName="prioridad"
        class="h-9 w-full rounded-xl border border-slate-200 bg-white px-3 text-sm text-slate-900 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/10 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-100">
        <option value="">Todas</option>
        <option value="alta">Alta</option>
        <option value="media">Media</option>
        <option value="baja">Baja</option>
      </select>
    </div>

    <!-- Solo pendientes -->
    <label class="flex cursor-pointer items-center gap-2 pb-1 select-none group">
      <input type="checkbox" formControlName="mostrarSoloPendientes"
        class="h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500/20 dark:bg-slate-800"/>
      <span class="text-sm font-semibold text-slate-600 dark:text-slate-400 group-hover:text-blue-600 transition">Solo pendientes</span>
    </label>

    <!-- Acciones -->
    <div class="flex items-center gap-2 pb-1 ml-auto">
      <button type="button" (click)="onReset()"
        class="inline-flex h-9 items-center gap-1.5 px-4 rounded-xl border border-slate-200 text-xs font-bold text-slate-500 hover:bg-slate-100 hover:text-slate-700 transition dark:border-slate-700 dark:text-slate-400 dark:hover:bg-slate-700">
        <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
        Limpiar
      </button>
    </div>

  </div>
</form>

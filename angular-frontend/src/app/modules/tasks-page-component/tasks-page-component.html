<main class="mx-auto min-h-screen max-w-7xl bg-slate-50 px-4 py-24 sm:px-8 sm:py-32 lg:px-16 dark:bg-slate-950">
  <app-back-to-landing-button class="mb-6 inline-flex lg:hidden"></app-back-to-landing-button>

  <div class="mb-8 flex flex-col gap-6 lg:flex-row lg:items-center lg:justify-between">
    <div class="w-full">
      <app-page-title
        class="w-full"
        title="Gestión de Tareas"
        subtitle="Organiza y administra tus pendientes con un vistazo rápido."
      ></app-page-title>
    </div>

    <div class="flex items-center gap-3">
      <app-back-to-landing-button class="hidden lg:inline-flex"></app-back-to-landing-button>
    </div>
  </div>

  <app-task-form-component
    [submitting]="creatingTask"
    (submitted)="onTaskSubmitted($event)"
  ></app-task-form-component>

  <app-task-filters-component
    (apply)="onFiltersApply($event)"
    (reset)="onFiltersReset()"
  ></app-task-filters-component>

  <app-task-list-component></app-task-list-component>
</main>

<main class="mx-auto flex min-h-screen max-w-7xl items-center justify-center px-4 py-16 dark:bg-slate-950">
  <section class="w-full max-w-md rounded-xl border bg-white p-8 shadow-sm dark:border-slate-700 dark:bg-slate-900">
    <div class="mb-6">
      <h1 class="text-3xl font-bold text-accent dark:text-slate-100">Iniciar sesión</h1>
      <p class="mt-2 text-sm text-slate-600 dark:text-slate-300">
        Accede a tu cuenta para gestionar tareas y funcionalidades administrativas.
      </p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
      <div>
        <label for="email" class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-200">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          [ngClass]="{
            'border-red-500 focus:ring-red-500': form.get('email')?.invalid && form.get('email')?.touched,
            'border-slate-300 focus:ring-primary-600 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100': !(form.get('email')?.invalid && form.get('email')?.touched)
          }"
          class="h-10 w-full rounded-md border px-3 text-sm focus:outline-none focus:ring-2"
        />

        <p
          *ngIf="form.get('email')?.hasError('required') && form.get('email')?.touched"
          class="mt-1 text-sm text-red-600"
        >
          El email es obligatorio.
        </p>

        <p
          *ngIf="form.get('email')?.hasError('email') && form.get('email')?.touched"
          class="mt-1 text-sm text-red-600"
        >
          Introduce un email válido.
        </p>
      </div>

      <div>
        <label for="password" class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-200">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          [ngClass]="{
            'border-red-500 focus:ring-red-500': form.get('password')?.invalid && form.get('password')?.touched,
            'border-slate-300 focus:ring-primary-600 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100': !(form.get('password')?.invalid && form.get('password')?.touched)
          }"
          class="h-10 w-full rounded-md border px-3 text-sm focus:outline-none focus:ring-2"
        />

        <p
          *ngIf="form.get('password')?.hasError('required') && form.get('password')?.touched"
          class="mt-1 text-sm text-red-600"
        >
          La contraseña es obligatoria.
        </p>
      </div>

      <button
        type="submit"
        [disabled]="loading || form.invalid"
        aria-label="Iniciar sesión"
        class="inline-flex h-10 items-center rounded-md bg-primary px-5 text-sm font-medium text-white transition hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-600 focus:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-60"
      >
        {{ loading ? 'Entrando...' : 'Entrar' }}
      </button>

      <p class="text-sm text-slate-600 dark:text-slate-300">
        ¿No tienes cuenta?
        <a routerLink="/register" class="font-medium text-primary transition hover:text-primary-700">
          Crea una aquí
        </a>.
        <a routerLink="/" class="ml-2 text-slate-600 transition hover:text-slate-800 dark:text-slate-300 dark:hover:text-slate-100">
          Volver al inicio
        </a>
      </p>
    </form>
  </section>
</main>

<nav
  *ngIf="store.isLoggedIn()"
  class="border-b bg-white shadow-sm dark:border-slate-700 dark:bg-slate-900"
>
  <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3">
    <div class="flex items-center gap-4">
      <a
        routerLink="/tasks"
        class="text-sm font-medium text-slate-700 transition hover:text-primary-700 dark:text-slate-200 dark:hover:text-blue-400"
      >
        Tareas
      </a>

      <a
        *ngIf="store.isAdmin()"
        routerLink="/admin"
        class="text-sm font-medium text-slate-700 transition hover:text-primary-700 dark:text-slate-200 dark:hover:text-blue-400"
      >
        Admin
      </a>
    </div>

    <div class="flex items-center gap-3">
      <button
        type="button"
        (click)="toggleTheme()"
        [attr.aria-label]="currentTheme === 'dark' ? 'Cambiar a tema claro' : 'Cambiar a tema oscuro'"
        class="inline-flex h-10 items-center rounded-md border border-slate-300 px-4 text-sm font-medium text-slate-700 transition hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-primary-600 focus:ring-offset-2 dark:border-slate-600 dark:text-slate-200 dark:hover:bg-slate-800"
      >
        {{ currentTheme === 'dark' ? 'Tema claro' : 'Tema oscuro' }}
      </button>

      <span class="text-sm text-slate-500 dark:text-slate-300">
        {{ store.user()?.email }}
      </span>

      <button
        type="button"
        (click)="logout()"
        aria-label="Cerrar sesión y volver al inicio"
        class="inline-flex h-10 items-center rounded-md bg-primary px-4 text-sm font-medium text-white transition hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-600 focus:ring-offset-2"
      >
        Cerrar sesión
      </button>
    </div>
  </div>
</nav>

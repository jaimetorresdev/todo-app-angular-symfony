<nav
  *ngIf="store.isLoggedIn()"
  class="sticky top-0 z-50 border-b border-slate-200 bg-white/80 backdrop-blur-md shadow-sm dark:border-slate-800 dark:bg-slate-950/80"
>
  <div class="flex w-full items-center justify-between px-6 h-16">
    
    <div class="flex items-center gap-8">
      <a routerLink="/" class="text-xl font-black tracking-tighter text-slate-900 dark:text-white group">
        TASK<span class="text-blue-600 group-hover:text-blue-500 transition-colors">PRO</span>
      </a>

      <div class="hidden md:flex items-center gap-1">
        <a
          routerLink="/tasks"
          routerLinkActive="bg-blue-50 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400"
          class="rounded-xl px-4 py-2 text-sm font-bold text-slate-600 transition-all hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800"
        >
          Tareas
        </a>

        <a
          *ngIf="!store.isAdmin()"
          routerLink="/settings"
          routerLinkActive="bg-blue-50 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400"
          class="rounded-xl px-4 py-2 text-sm font-bold text-slate-600 transition-all hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800"
        >
          Ajustes
        </a>

        <a
          *ngIf="store.isAdmin()"
          routerLink="/admin"
          routerLinkActive="bg-blue-50 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400"
          class="rounded-xl px-4 py-2 text-sm font-bold text-slate-600 transition-all hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800"
        >
          Admin
        </a>
      </div>
    </div>

    <div class="flex items-center gap-4">
      
      <!-- Theme toggle — pill switch -->
      <button
        type="button"
        (click)="toggleTheme()"
        [attr.aria-label]="currentTheme === 'dark' ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
        class="relative flex h-8 w-[52px] cursor-pointer items-center rounded-full border p-0.5 transition-all duration-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:ring-offset-2"
        [ngClass]="currentTheme === 'dark'
          ? 'border-slate-600 bg-slate-800'
          : 'border-slate-200 bg-slate-100 hover:bg-slate-200'"
      >
        <!-- Track icons -->
        <span class="absolute left-1.5 flex h-4 w-4 items-center justify-center transition-opacity duration-200"
          [ngClass]="currentTheme === 'dark' ? 'opacity-100' : 'opacity-0'">
          <!-- Moon icon (shown in dark mode, on the left) -->
          <svg class="h-3 w-3 text-slate-400" fill="currentColor" viewBox="0 0 20 20">
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
          </svg>
        </span>
        <span class="absolute right-1.5 flex h-4 w-4 items-center justify-center transition-opacity duration-200"
          [ngClass]="currentTheme !== 'dark' ? 'opacity-100' : 'opacity-0'">
          <!-- Sun icon (shown in light mode, on the right) -->
          <svg class="h-3 w-3 text-amber-500" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>
          </svg>
        </span>
        <!-- Thumb -->
        <span class="relative z-10 flex h-6 w-6 items-center justify-center rounded-full shadow-md transition-all duration-300"
          [ngClass]="currentTheme === 'dark'
            ? 'translate-x-[22px] bg-slate-700 shadow-slate-900/40'
            : 'translate-x-0 bg-white shadow-slate-300/60'">
          <!-- Thumb icon -->
          <svg *ngIf="currentTheme !== 'dark'" class="h-3 w-3 text-amber-400" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>
          </svg>
          <svg *ngIf="currentTheme === 'dark'" class="h-3 w-3 text-slate-300" fill="currentColor" viewBox="0 0 20 20">
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
          </svg>
        </span>
      </button>

      <div class="hidden lg:flex flex-col items-end">
        <span class="text-[10px] font-black uppercase tracking-[0.15em] text-slate-400">Usuario Activo</span>
        <span class="text-sm font-bold text-slate-700 dark:text-slate-200">{{ store.user()?.email }}</span>
      </div>

      <button
        type="button"
        (click)="logout()"
        class="h-10 rounded-xl border border-slate-200 px-5 text-xs font-bold uppercase tracking-widest text-slate-600 transition-all hover:border-red-200 hover:bg-red-50 hover:text-red-600 dark:border-slate-700 dark:text-slate-400 dark:hover:bg-red-900/20"
      >
        Salir
      </button>

    </div>
  </div>
</nav>

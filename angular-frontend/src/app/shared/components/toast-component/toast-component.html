<div aria-live="polite" aria-atomic="false"
  class="pointer-events-none fixed top-5 left-1/2 -translate-x-1/2 z-50 flex flex-col items-center gap-2 w-full max-w-sm px-4">

  @for (t of toasts; track t.id) {
    <div
      class="pointer-events-auto w-full flex items-center gap-3 rounded-2xl px-4 py-3 shadow-xl shadow-black/10 transition-all duration-300"
      [ngClass]="{
        'bg-emerald-50  border border-emerald-200  text-emerald-800  dark:bg-emerald-950/80  dark:border-emerald-800/60  dark:text-emerald-300': t.type === 'success',
        'bg-red-600     text-white':                                                                                                             t.type === 'error',
        'bg-blue-600    text-white':                                                                                                             t.type === 'info',
        'bg-amber-500   text-white':                                                                                                             t.type === 'warning'
      }"
      role="alert"
    >
      <!-- Icono -->
      <span class="flex h-6 w-6 flex-shrink-0 items-center justify-center rounded-full"
        [ngClass]="{
          'bg-emerald-200/70 text-emerald-700 dark:bg-emerald-800/60 dark:text-emerald-300': t.type === 'success',
          'bg-white/20 text-white': t.type === 'error' || t.type === 'info' || t.type === 'warning'
        }">
        @if (t.type === 'success') {
          <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
          </svg>
        }
        @if (t.type === 'error') {
          <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        }
        @if (t.type === 'info') {
          <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01"/>
          </svg>
        }
        @if (t.type === 'warning') {
          <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01"/>
          </svg>
        }
      </span>

      <p class="flex-1 text-sm font-semibold leading-snug">{{ t.message }}</p>

      <button
        type="button"
        (click)="dismiss(t.id)"
        class="flex-shrink-0 flex h-5 w-5 items-center justify-center rounded-lg opacity-50 hover:opacity-100 transition-opacity"
        [ngClass]="{
          'hover:bg-emerald-100 dark:hover:bg-emerald-800/50 text-emerald-700 dark:text-emerald-400': t.type === 'success',
          'hover:bg-white/20 text-white': t.type !== 'success'
        }"
        aria-label="Cerrar">
        <svg class="h-3 w-3" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M1 1l12 12M13 1L1 13"/>
        </svg>
      </button>
    </div>
  }
</div>
